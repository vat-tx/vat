<!DOCTYPE html>

  <body>
      <h2> Mike Bagwell </h2>
      <h1> Che Vuoi? </h1>
      <h3>From The Skypenis Sagas</h3>
      Skypenis writes a poem<br>
in couplets<br>
    <br>
in real-time<br>
like Wile E. Coyote<br>
    <br>
laying out railroad ties<br>
into thin air<br>
    <br>
he lights the dynamite<br>
he jumps the alligators<br>
    <br>
and pauses<br>
in their jaws<br>
    <br>
when he falls he just<br>
eats the river whole<br>
  </body>
</html>

      <h2> Sam Robinson </h2>
      <h1> Jeu No. 41 </h1>
      Four elements fuck,<br>
war, give birth &amp; eat<br>
offspring not of their line,<br>
somehow bent in a circle.<br>
The circle is very large &amp; it turns<br>
endlessly. O! Fate! O! Where<br>
can I find the mouth of my dear<br>
volcano? I should travel more.<br>
